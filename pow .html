<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PoW Solver</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0d0d0d; color:#eee; font-family:monospace; padding:16px; }
  h2 { color:#fff; margin-bottom:16px; }
  input {
    width:100%; background:#1a1a1a; border:1px solid #333;
    color:#eee; padding:8px; border-radius:4px;
    font-family:monospace; font-size:12px; margin-bottom:10px;
  }
  button {
    width:100%; background:#1d4ed8; color:#fff; border:none;
    padding:12px; border-radius:4px; cursor:pointer;
    font-family:monospace; font-size:14px; margin-bottom:10px;
  }
  button:disabled { background:#333; color:#666; }
  #log {
    background:#0a0a0a; border:1px solid #333; border-radius:4px;
    padding:10px; font-size:11px; min-height:60px;
    white-space:pre-wrap; word-break:break-all; color:#4ade80;
  }
  #token {
    display:none; background:#0a0a0a; border:1px solid #1d4ed8;
    border-radius:4px; padding:10px; font-size:11px;
    word-break:break-all; color:#93c5fd; margin-top:10px;
  }
  .copy { background:#166534; }
  .copy:hover { background:#15803d; }
  label { color:#888; font-size:11px; display:block; margin-bottom:4px; }
</style>
</head>
<body>

<h2>🔐 DeepSeek PoW Solver</h2>

<label>Bearer Token</label>
<input id="bearer" value="FWFHWsL/jP5qn2qjUl+o61yEcXwU/GbpnXXbXZJwUEm561LsC71owK+En280p5MO">

<button id="btn" onclick="fetchAndSolve()">⚡ Fetch Challenge + Solve</button>

<div id="log">Ready — tap the button!</div>

<div id="token">
  <b>✅ x-ds-pow-response token:</b><br><br>
  <span id="tokenVal"></span>
  <br><br>
  <b>Winning input string:</b><br>
  <span id="winInput"></span>
  <br><br>
  <b>Nonce:</b> <span id="nonceVal"></span>
</div>
<button class="copy" id="copyBtn" onclick="copyToken()" style="display:none">📋 Copy Token</button>

<script>
const API = 'https://chat.deepseek.com';
let solvedToken = '';

function log(msg) {
  document.getElementById('log').textContent += '\n' + msg;
}

async function sha256hex(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function fetchAndSolve() {
  const bearer = document.getElementById('bearer').value.trim();
  const btn = document.getElementById('btn');
  btn.disabled = true;
  document.getElementById('log').textContent = '🔄 Fetching challenge...';
  document.getElementById('token').style.display = 'none';
  document.getElementById('copyBtn').style.display = 'none';

  try {
    // Step 1: Get challenge
    const r = await fetch(API + '/api/v0/chat/create_pow_challenge', {
      method: 'POST',
      headers: {
        'content-type': 'application/json',
        'authorization': 'Bearer ' + bearer
      },
      body: JSON.stringify({target_path: '/api/v0/chat/completion'})
    });
    const d = await r.json();
    const c = d.data.biz_data.challenge;

    log('✅ Got challenge!');
    log('challenge: ' + c.challenge);
    log('salt: ' + c.salt);
    log('expireAt: ' + c.expire_at);
    log('difficulty: ' + c.difficulty);

    const prefix = c.salt + '_' + c.expire_at + '_';
    log('prefix: ' + prefix);
    log('');
    log('⚡ Solving...');

    // Step 2: Solve
    let nonce = -1;
    let winInput = '';

    for (let n = 0; n < c.difficulty; n++) {
      if (n % 5000 === 0 && n > 0) {
        document.getElementById('log').textContent =
          document.getElementById('log').textContent.replace(/\nTrying.*/g,'');
        log('Trying nonce ' + n + '/' + c.difficulty + '...');
        await new Promise(res => setTimeout(res, 0));
      }
      const input = prefix + n;
      const h = await sha256hex(input);
      if (h === c.challenge) {
        nonce = n;
        winInput = input;
        break;
      }
    }

    if (nonce === -1) {
      log('❌ SHA-256 failed — challenge may use different hash');
      log('Trying without expireAt...');

      for (let n = 0; n < c.difficulty; n++) {
        const input = c.salt + '_' + n;
        const h = await sha256hex(input);
        if (h === c.challenge) {
          nonce = n;
          winInput = input;
          break;
        }
      }
    }

    if (nonce === -1) {
      log('❌ Could not solve. Logging challenge for analysis:');
      log('SHA-256(prefix+0) = ' + await sha256hex(prefix + '0'));
      log('Expected: ' + c.challenge);
      btn.disabled = false;
      return;
    }

    // Step 3: Build token
    const payload = {
      algorithm  : c.algorithm,
      challenge  : c.challenge,
      salt       : c.salt,
      answer     : nonce,
      signature  : c.signature,
      target_path: '/api/v0/chat/completion'
    };
    solvedToken = btoa(JSON.stringify(payload));

    log('✅ SOLVED! nonce=' + nonce);
    log('winning input: ' + winInput);

    document.getElementById('tokenVal').textContent  = solvedToken;
    document.getElementById('winInput').textContent  = winInput;
    document.getElementById('nonceVal').textContent  = nonce;
    document.getElementById('token').style.display   = 'block';
    document.getElementById('copyBtn').style.display = 'block';

  } catch(e) {
    log('❌ Error: ' + e.message);
  }

  btn.disabled = false;
}

function copyToken() {
  navigator.clipboard.writeText(solvedToken).then(() => {
    document.getElementById('copyBtn').textContent = '✅ Copied!';
    setTimeout(() => {
      document.getElementById('copyBtn').textContent = '📋 Copy Token';
    }, 2000);
  });
}
</script>
</body>
</html>
