<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Captcha Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f0f0f;
    color: #eee;
    font-family: monospace;
    padding: 16px;
  }

  #header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  h2 { font-size: 16px; color: #fff; }

  #status {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 20px;
    background: #333;
    color: #888;
  }
  #status.connected { background: #1a3a1a; color: #4ade80; }
  #status.error     { background: #3a1a1a; color: #f87171; }

  #grid {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
  }

  .card {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 10px;
    position: relative;
  }

  .card-title {
    font-size: 11px;
    color: #666;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }

  .card-title span { color: #4ade80; }

  .img-wrap {
    position: relative;
    cursor: crosshair;
    display: inline-block;
  }

  .img-wrap img {
    display: block;
    width: 480px;
    height: 220px;
    image-rendering: pixelated;
    border-radius: 4px;
  }

  .dot {
    position: absolute;
    width: 12px;
    height: 12px;
    background: red;
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    border: 2px solid #fff;
    box-shadow: 0 0 4px rgba(0,0,0,0.8);
  }

  /* Groq dot = blue */
  .dot.groq {
    background: #3b82f6;
  }

  .coords {
    font-size: 13px;
    color: #4ade80;
    margin-top: 6px;
    min-height: 20px;
  }

  .coords .groq-coords {
    color: #3b82f6;
    margin-left: 12px;
  }

  .empty {
    color: #444;
    font-size: 13px;
    padding: 40px;
    text-align: center;
    width: 100%;
  }
</style>
</head>
<body>

<div id="header">
  <h2>🔒 Live Captcha Viewer</h2>
  <div id="status">connecting...</div>
</div>

<div id="grid">
  <div class="empty" id="empty">Waiting for captchas from gruto.py...</div>
</div>

<script>
  const grid     = document.getElementById('grid');
  const statusEl = document.getElementById('status');
  const SERVER   = 'http://127.0.0.1:5000';

  // account_id → card data
  const cards = {};

  function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className   = cls || '';
  }

  function connect() {
    setStatus('connecting...', '');
    const es = new EventSource(`${SERVER}/panel/stream`);

    es.addEventListener('full_state', e => {
      setStatus('● connected', 'connected');
    });

    es.addEventListener('captcha', e => {
      const d = JSON.parse(e.data);
      if (d.image_b64) addCard(d.account_id, d.image_b64, null, null);
    });

    // groq_result event — show groq's answer as blue dot
    es.addEventListener('groq_result', e => {
      const d = JSON.parse(e.data);
      if (d.image_b64) addCard(d.account_id, d.image_b64, d.x, d.y);
      else updateGroqDot(d.account_id, d.x, d.y);
    });

    es.addEventListener('captcha_solved', e => {
      const d = JSON.parse(e.data);
      markSolved(d.account_id);
    });

    es.onerror = () => {
      setStatus('✕ disconnected', 'error');
      es.close();
      setTimeout(connect, 3000);
    };
  }

  function addCard(account_id, img_b64, groq_x, groq_y) {
    // Remove existing card for this account
    const existing = document.getElementById('card-' + account_id);
    if (existing) existing.remove();

    const empty = document.getElementById('empty');
    if (empty) empty.remove();

    const now = new Date().toLocaleTimeString();

    const card = document.createElement('div');
    card.className = 'card';
    card.id = 'card-' + account_id;

    card.innerHTML = `
      <div class="card-title">
        <span>${account_id}</span>
        <span style="color:#666">${now}</span>
      </div>
      <div class="img-wrap" id="wrap-${account_id}">
        <img src="data:image/jpeg;base64,${img_b64}" id="img-${account_id}" draggable="false">
      </div>
      <div class="coords" id="coords-${account_id}">
        <span id="click-coords-${account_id}" style="color:#888">click to measure</span>
        ${groq_x !== null ? `<span class="groq-coords">🤖 groq: x=${groq_x} y=${groq_y}</span>` : ''}
      </div>
    `;

    grid.prepend(card);
    cards[account_id] = { groq_x, groq_y };

    // Add groq dot if we have coords
    if (groq_x !== null) {
      addGroqDot(account_id, groq_x, groq_y);
    }

    // Click to measure
    const img  = card.querySelector('img');
    const wrap = card.querySelector('.img-wrap');

    img.addEventListener('click', e => {
      const rect = img.getBoundingClientRect();
      const px   = e.clientX - rect.left;
      const py   = e.clientY - rect.top;

      // Scale to real 240x110
      const x = Math.round(px * 240 / rect.width);
      const y = Math.round(py * 110 / rect.height);

      // Remove old click dot
      const old = wrap.querySelector('.dot.click');
      if (old) old.remove();

      // Add red dot
      const dot = document.createElement('div');
      dot.className = 'dot click';
      dot.style.left = px + 'px';
      dot.style.top  = py + 'px';
      wrap.appendChild(dot);

      document.getElementById('click-coords-' + account_id).textContent = `👆 x=${x}  y=${y}`;
    });
  }

  function addGroqDot(account_id, groq_x, groq_y) {
    const img  = document.getElementById('img-' + account_id);
    const wrap = document.getElementById('wrap-' + account_id);
    if (!img || !wrap) return;

    const old = wrap.querySelector('.dot.groq');
    if (old) old.remove();

    const rect = img.getBoundingClientRect();
    // If image not yet rendered, use CSS size
    const w = rect.width  || 480;
    const h = rect.height || 220;

    const px = groq_x * w / 240;
    const py = groq_y * h / 110;

    const dot = document.createElement('div');
    dot.className = 'dot groq';
    dot.style.left = px + 'px';
    dot.style.top  = py + 'px';
    wrap.appendChild(dot);

    // Update coords display
    const coordsEl = document.getElementById('coords-' + account_id);
    if (coordsEl) {
      let groqSpan = coordsEl.querySelector('.groq-coords');
      if (!groqSpan) {
        groqSpan = document.createElement('span');
        groqSpan.className = 'groq-coords';
        coordsEl.appendChild(groqSpan);
      }
      groqSpan.textContent = `🤖 groq: x=${groq_x} y=${groq_y}`;
    }
  }

  function updateGroqDot(account_id, x, y) {
    addGroqDot(account_id, x, y);
  }

  function markSolved(account_id) {
    const card = document.getElementById('card-' + account_id);
    if (card) {
      card.style.borderColor = '#4ade80';
      const title = card.querySelector('.card-title span');
      if (title) title.textContent = '✅ ' + account_id;
    }
  }

  connect();
</script>
</body>
</html>
