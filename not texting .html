<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCM Notification Tester</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #06b6d4;
            --text: #f8fafc;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: var(--card);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        h2 { text-align: center; color: var(--primary); margin-bottom: 1.5rem; }
        .group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #94a3b8; }
        input, select, textarea {
            width: 100%;
            padding: 0.8rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            border: none;
            border-radius: 0.5rem;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
            transition: opacity 0.2s;
        }
        button:active { opacity: 0.8; }
        #status {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 0.5rem;
            display: none;
            font-size: 0.85rem;
            word-break: break-all;
        }
        .success { background: rgba(16, 185, 129, 0.2); color: #10b981; display: block !important; }
        .error { background: rgba(239, 68, 68, 0.2); color: #ef4444; display: block !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>G-ZONE Push Tester</h2>
    
    <div class="group">
        <label>Target Type</label>
        <select id="target" onchange="toggleUid()">
            <option value="all">All Users</option>
            <option value="single">Specific User (UID)</option>
        </select>
    </div>

    <div class="group" id="uid-box" style="display:none;">
        <label>Firebase UID</label>
        <input type="text" id="uid" placeholder="Paste user firebase_uid here">
    </div>

    <div class="group">
        <label>Notification Title</label>
        <input type="text" id="title" placeholder="e.g. Match Starting!">
    </div>

    <div class="group">
        <label>Message Body</label>
        <textarea id="body" rows="3" placeholder="e.g. Room ID: 12345 Pass: 0000"></textarea>
    </div>

    <button id="sendBtn" onclick="sendNotification()">Send Notification</button>

    <div id="status"></div>
</div>

<script>
    function toggleUid() {
        const target = document.getElementById('target').value;
        document.getElementById('uid-box').style.display = (target === 'single') ? 'block' : 'none';
    }

    async function sendNotification() {
        const btn = document.getElementById('sendBtn');
        const status = document.getElementById('status');
        const workerUrl = 'https://pushsystem.moeenu321.workers.dev/';

        // Get Inputs
        const target = document.getElementById('target').value;
        const uid = document.getElementById('uid').value.trim();
        const title = document.getElementById('title').value.trim();
        const body = document.getElementById('body').value.trim();

        if(!title || !body) {
            alert("Please enter title and body");
            return;
        }

        // Prepare Payload
        const payload = {
            target: target,
            title: title,
            body: body
        };

        if(target === 'single') {
            if(!uid) { alert("Please enter a UID"); return; }
            payload.uids = [uid]; // Script expects an array
        }

        // Start Loading
        btn.disabled = true;
        btn.innerText = 'Sending...';
        status.className = '';
        status.innerText = 'Processing...';

        try {
            const response = await fetch(workerUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const result = await response.json();

            if (result.success) {
                status.className = 'success';
                status.innerText = `Success! Tokens reached: ${result.count}`;
            } else {
                status.className = 'error';
                status.innerText = `Error: ${result.error}`;
            }
        } catch (error) {
            status.className = 'error';
            status.innerText = `Network Error: ${error.message}`;
        } finally {
            btn.disabled = false;
            btn.innerText = 'Send Notification';
        }
    }
</script>

</body>
</html>
